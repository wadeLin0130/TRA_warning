<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>列車監視輔助小工具</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="./icon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="./geo.js"></script>
  <style>
    #map { height: 150px; border-radius: 12px; }
    #danger-alert.danger-blink { animation: blink-red 600ms infinite; }
    @keyframes blink-red {
      0%, 100% { background-color: #b91c1c; }
      50% { background-color: #dc2626; box-shadow: 0 0 0 12px rgba(220,38,38,.4); }
    }
    @keyframes arrow-bob {
      0%   { transform: translate(0px, 0); }
      100% { transform: translate(3.5px, 0); }
    }
    @keyframes alarm-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,.6); }
      50%       { box-shadow: 0 0 0 10px rgba(220,38,38,0); }
    }
    .alarm-btn-active { animation: alarm-pulse 700ms infinite; }
  </style>
</head>
<body class="bg-slate-100 text-slate-900">
  <div class="max-w-[420px] mx-auto bg-white min-h-screen shadow-sm">
    <input id="lat" type="hidden" value="">
    <input id="lon" type="hidden" value="">

    <!-- iOS install guide (shown only on iOS Safari, not yet installed) -->
    <div id="ios-install-guide" class="hidden mx-2 mt-2 bg-sky-50 border border-sky-300 rounded-xl px-3 py-2.5 text-xs text-sky-900">
      <div class="flex items-start justify-between gap-2">
        <div>
          <div class="font-bold mb-1">📲 安裝為 App（加入主畫面）</div>
          <div>1. 點 Safari 下方 <span class="font-bold">分享</span> 🔗 圖示</div>
          <div>2. 選擇「<span class="font-bold">加入主畫面</span>」</div>
          <div>3. 點右上角「<span class="font-bold">新增</span>」完成</div>
        </div>
        <button onclick="document.getElementById('ios-install-guide').remove(); localStorage.setItem('iosGuideDismissed','1')"
          class="shrink-0 text-sky-400 text-lg leading-none px-1">✕</button>
      </div>
    </div>

    <!-- Android/desktop install button (shown when beforeinstallprompt fires) -->
    <div id="install-bar" class="hidden mx-2 mt-2">
      <button id="btn-install"
        class="w-full py-2.5 font-bold bg-sky-600 hover:bg-sky-700 text-white rounded-xl flex items-center justify-center gap-2 shadow text-sm">
        📲 安裝為 App（加入主畫面）
      </button>
    </div>

    <div class="mx-2 mt-2 bg-amber-50 border border-amber-300 rounded-xl px-3 py-2 text-xs text-amber-800 text-center font-medium">
      本工具僅警示時刻表載客列車，路線上工作仍請注意瞭望
    </div>

    <div class="p-2">
      <button id="btn-my-loc"
              class="w-full py-3.5 text-lg font-extrabold bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white rounded-2xl transition flex items-center justify-center gap-2 shadow">
        📍 使用我的位置
      </button>
    </div>

    <div class="mx-2 bg-slate-50 border border-slate-200 rounded-2xl p-3">
      <div id="current-pos" class="text-emerald-700">尚未偵測位置</div>
      <div class="mt-1 flex items-center gap-2">
        <select id="line-select" class="text-xs border rounded px-1 py-0.5 bg-white flex-1"></select>
        <button id="btn-refresh" class="px-2.5 py-1 text-xs font-medium bg-emerald-600 text-white rounded-lg active:scale-[0.985]">更新</button>
        <button id="btn-clear" class="px-2.5 py-1 text-xs font-medium bg-white border border-slate-300 rounded-lg active:bg-slate-100">清除</button>
      </div>
    </div>

    <div class="mx-2 mt-2 bg-white border border-slate-200 rounded-2xl p-2 flex flex-wrap items-center gap-x-3 gap-y-1 text-sm">
      <label class="flex items-center gap-1 text-sm">
        <input type="checkbox" id="auto-refresh" class="accent-emerald-600" checked>
        <span>自動</span>
      </label>
      <label class="flex items-center gap-1 text-sm" id="keep-awake-label" title="防止手機自動熄屏">
        <input type="checkbox" id="keep-awake" class="accent-emerald-600">
        <span>常亮</span>
      </label>
      <div class="flex-1 min-w-[130px] flex items-center gap-1">
        <span class="text-xs text-slate-500">警戒距離</span>
        <input type="range" id="danger-buffer-range" min="0.5" max="20" step="0.5" value="2.0" class="flex-1 accent-red-600">
        <input id="danger-buffer" type="number" value="2.0" min="0.5" max="20" step="0.5" class="w-8 border rounded px-0.5 py-0 text-xs font-mono text-center">
        <span class="text-xs text-slate-500">km</span>
      </div>
    </div>

    <div id="danger-alert" class="hidden mx-2 mt-2 bg-red-600 text-white text-center py-2.5 px-3 rounded-2xl font-extrabold text-base shadow-lg border-2 border-red-700 danger-blink">
      ⚠️ 警戒區間有列車接近！ 立即注意
    </div>

    <div class="mx-2 mt-2">
      <div id="trains-loading" class="bg-slate-50 border border-slate-200 rounded-2xl p-5 text-center text-slate-400 text-sm">
        載入中...
      </div>
      <div id="trains-panels" class="hidden">
        <div class="bg-blue-50 border border-blue-200 rounded-2xl p-2 mb-2">
          <div id="dir-low-title" class="font-extrabold text-blue-900 text-xl mb-1"></div>
          <div id="north-trains" class="space-y-1.5 min-h-[70px]"></div>
        </div>
        <div class="bg-orange-50 border border-orange-200 rounded-2xl p-2">
          <div id="dir-high-title" class="font-extrabold text-orange-900 text-xl mb-1"></div>
          <div id="south-trains" class="space-y-1.5 min-h-[70px]"></div>
        </div>
      </div>
    </div>

    <div class="mx-2 mt-3">
      <div class="flex items-center justify-between mb-1 px-0.5">
        <span class="text-xs text-slate-500">地圖（點擊地圖可設定位置）</span>
        <button id="btn-map-expand" class="px-2 py-0.5 text-xs font-medium border border-slate-300 rounded-lg bg-white active:bg-slate-100">放大</button>
      </div>
      <div id="map" class="w-full border border-slate-300 rounded-2xl transition-[height] duration-150" style="height: 150px;"></div>
    </div>
    <div class="h-16"></div>
  </div>

  <!-- 喇叭/靜音按鈕（固定於右下角） -->
  <button id="btn-alarm-toggle"
    class="fixed bottom-5 right-4 z-50 w-13 h-13 rounded-full bg-emerald-600 text-2xl shadow-lg flex items-center justify-center border-2 border-white active:scale-90 transition select-none"
    style="width:52px;height:52px" title="警報音效">
    🔊
  </button>

  <script>
    // ── Firebase config ──────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyDxt-3a2XZwjaTtb63R5NiLJTfZtQLWbrM",
      authDomain: "tra-trainwarning.firebaseapp.com",
      databaseURL: "https://tra-trainwarning-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "tra-trainwarning",
      storageBucket: "tra-trainwarning.firebasestorage.app",
      messagingSenderId: "769846204984",
      appId: "1:769846204984:web:f6a5f2b305504efd2ce4cd",
    };

    // ── State ────────────────────────────────────────────────────
    let map, userMarker, projMarker, trackLayerGroup, dangerLayer;
    let trainMarkers = [];
    let autoInterval = null;
    let bufferUpdateTimer = null;
    let rtdbResultsRef = null;
    let mapExpanded = false;

    // ── Alarm state ──────────────────────────────────────────────
    let alarmEnabled     = true;
    let alarmActive      = false;
    let alarmTrainIds    = new Set();
    let dismissedTrainIds = new Set(); // trains manually silenced; re-arms when train leaves zone
    let alarmTimer       = null;
    let audioCtx         = null;
    let alarmOsc         = null; // main siren oscillator
    let alarmLFO         = null; // frequency sweep LFO
    let alarmGain        = null; // master gain (set to 0 to stop)

    window.currentMileages = {};
    window.currentSelectedLine = null;

    let clientId = localStorage.getItem('rtdbClientId');
    if (!clientId) {
      clientId = 'client_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
      localStorage.setItem('rtdbClientId', clientId);
    }

    // ── Wake Lock (screen always-on) ────────────────────────────
    let wakeLock = null;

    async function requestWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => {
          wakeLock = null;
          // Re-acquire if still enabled and tab is visible
          if (document.getElementById('keep-awake')?.checked && document.visibilityState === 'visible') {
            requestWakeLock();
          }
        });
      } catch (e) {
        console.warn('Wake lock failed:', e.message);
      }
    }

    function releaseWakeLock() {
      wakeLock?.release().catch(() => {});
      wakeLock = null;
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && document.getElementById('keep-awake')?.checked) {
        requestWakeLock();
      }
    });

    // ── Alarm audio ─────────────────────────────────────────────
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function _startAlarmSound() {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();

      alarmGain = ctx.createGain();
      alarmGain.gain.setValueAtTime(0, ctx.currentTime);
      alarmGain.gain.linearRampToValueAtTime(0.32, ctx.currentTime + 0.15);
      alarmGain.connect(ctx.destination);

      // Siren: sawtooth swept 440↔840 Hz by LFO at 0.9 Hz
      alarmOsc = ctx.createOscillator();
      alarmOsc.type = 'sawtooth';
      alarmOsc.frequency.value = 640;

      alarmLFO = ctx.createOscillator();
      alarmLFO.type = 'sine';
      alarmLFO.frequency.value = 0.9;

      const lfoGain = ctx.createGain();
      lfoGain.gain.value = 200;

      alarmLFO.connect(lfoGain);
      lfoGain.connect(alarmOsc.frequency);
      alarmOsc.connect(alarmGain);

      alarmLFO.start();
      alarmOsc.start();

      // Android vibration pattern for 30 s (no-op on iOS)
      if (navigator.vibrate) navigator.vibrate(Array(25).fill([400, 250]).flat());
    }

    function _stopAlarmSound() {
      if (alarmGain && audioCtx) {
        alarmGain.gain.setValueAtTime(alarmGain.gain.value, audioCtx.currentTime);
        alarmGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
      }
      setTimeout(() => {
        try { alarmOsc?.stop(); } catch(e) {}
        try { alarmLFO?.stop(); } catch(e) {}
        alarmOsc = alarmLFO = alarmGain = null;
      }, 120);
      if (navigator.vibrate) navigator.vibrate(0);
    }

    function startAlarm(trainIds) {
      alarmTrainIds = new Set(trainIds);
      if (alarmActive) return;
      alarmActive = true;
      _startAlarmSound();
      clearTimeout(alarmTimer);
      alarmTimer = setTimeout(stopAlarm, 30000);
    }

    function stopAlarm() {
      // Remember which trains were silenced so we don't re-trigger while they stay in zone
      alarmTrainIds.forEach(id => dismissedTrainIds.add(id));
      alarmActive = false;
      alarmTrainIds.clear();
      clearTimeout(alarmTimer);
      alarmTimer = null;
      _stopAlarmSound();
      document.querySelectorAll('.alarm-dismiss-btn').forEach(el => el.remove());
    }

    // ── Firebase ─────────────────────────────────────────────────
    firebase.initializeApp(firebaseConfig);
    const fbdb = firebase.database();

    function writePositionToRtdb(lat, lon, lineId, mileage, bufferKm) {
      fbdb.ref(`watched_positions/${clientId}`).set({
        lat, lon, line_id: lineId, mileage,
        buffer_km: bufferKm || 2.0,
        updated_at: new Date().toISOString(),
      });
    }

    function subscribeToResults() {
      if (rtdbResultsRef) rtdbResultsRef.off();
      rtdbResultsRef = fbdb.ref(`user_results/${clientId}`);
      rtdbResultsRef.on('value', snap => {
        const data = snap.val();
        if (!data) return;
        renderFromData(data);
      });
    }

    // ── Render from RTDB result (same shape as /api/upcoming) ────
    function renderFromData(data) {
      const dangerIds = data.danger_zone?.station_ids || [];
      const dirs = data.directions || [];

      document.getElementById('trains-loading')?.classList.add('hidden');
      document.getElementById('trains-panels')?.classList.remove('hidden');

      withPreservedScroll(() => {
        const lowTitleEl = document.getElementById('dir-low-title');
        const highTitleEl = document.getElementById('dir-high-title');
        const northEl = document.getElementById('north-trains');
        const southEl = document.getElementById('south-trains');

        if (dirs.length >= 2) {
          if (lowTitleEl) lowTitleEl.textContent = dirs[0].label || '往低端方向';
          if (highTitleEl) highTitleEl.textContent = dirs[1].label || '往高端方向';
        }

        updateDangerOnMap(data);
        updateTrainMarkersOnMap(data);

        const inZoneTrains = dirs.flatMap(d =>
          (d.trains || []).filter(t => dangerIds.includes(t.current_station_id))
        );
        const hasInZone = inZoneTrains.length > 0;

        // Clear dismissed memory for trains that left the zone (so they re-arm next time)
        const currentZoneIds = new Set(inZoneTrains.map(t => t.train_no));
        dismissedTrainIds.forEach(id => { if (!currentZoneIds.has(id)) dismissedTrainIds.delete(id); });

        // Alarm trigger — skip trains user already silenced this visit
        const newInZone = inZoneTrains.filter(t => !dismissedTrainIds.has(t.train_no));
        if (alarmEnabled && newInZone.length > 0 && !alarmActive) {
          startAlarm(newInZone.map(t => t.train_no));
        } else if (!hasInZone && alarmActive) {
          stopAlarm();
        }

        if (dirs.length >= 2) {
          if (northEl) northEl.innerHTML = renderTrainCards(dirs[0].trains || [], 'blue', dangerIds);
          if (southEl) southEl.innerHTML = renderTrainCards(dirs[1].trains || [], 'orange', dangerIds);
        }

        const alertEl = document.getElementById('danger-alert');
        if (alertEl) {
          if (hasInZone) { alertEl.classList.remove('hidden'); alertEl.classList.add('danger-blink'); }
          else { alertEl.classList.add('hidden'); alertEl.classList.remove('danger-blink'); }
        }
      });
    }

    // ── Geo & position detection ─────────────────────────────────
    async function detectPosition() {
      const lat = parseFloat(document.getElementById('lat').value);
      const lon = parseFloat(document.getElementById('lon').value);
      if (!lat || !lon) { alert('請先取得 GPS 位置'); return; }

      document.getElementById('current-pos').innerHTML = '<div class="text-xs text-slate-500">計算中...</div>';
      setUserMarker(lat, lon);

      try {
        const geo = await getGeoIndex('./data');
        const res = geo.findClosest(lat, lon);
        if (!res) {
          document.getElementById('current-pos').innerHTML = '<div class="text-xs text-red-500">附近找不到台鐵線路</div>';
          return;
        }

        const km = res.mileageKm, kInt = Math.floor(km);
        document.getElementById('current-pos').innerHTML = `
          <div class="text-xs text-emerald-600">${res.lineName}</div>
          <div class="font-mono text-3xl font-black text-emerald-700 tracking-[-1px] leading-none">${res.mileageK}</div>
        `;

        if (res.projectionLat) showProjection(res.projectionLat, res.projectionLon, res.lineName);

        // Nearby lines for junction select
        const lineSel = document.getElementById('line-select');
        if (lineSel) {
          lineSel.innerHTML = '';
          window.currentMileages = {};
          const addOpt = (lid, name, mk, mKm) => {
            const o = document.createElement('option');
            o.value = lid; o.textContent = `${name} (${mk})`;
            lineSel.appendChild(o);
            window.currentMileages[lid] = mKm;
          };
          addOpt(res.lineId, res.lineName, res.mileageK, res.mileageKm);
          const nearby = geo.findNearbyLines(lat, lon, 1000, 5)
            .filter(n => (n.effective_line_id || n.line_id) !== (geo.shapesToSol[res.lineId] || res.lineId));
          for (const nl of nearby) addOpt(nl.line_id, nl.line_name, nl.mileage_k, nl.mileage_km);
          lineSel.value = res.lineId;
          window.currentSelectedLine = res.lineId;
        }

        const buf = parseFloat(document.getElementById('danger-buffer')?.value) || 2.0;
        writePositionToRtdb(lat, lon, res.lineId, res.mileageKm, buf);
        subscribeToResults();

      } catch (e) {
        document.getElementById('current-pos').innerHTML = `<div class="text-xs text-red-500">計算失敗：${e.message}</div>`;
      }
    }

    function triggerUpdate(shouldFit = false) {
      const lat = parseFloat(document.getElementById('lat').value);
      const lon = parseFloat(document.getElementById('lon').value);
      const sel = window.currentSelectedLine;
      const mile = sel ? window.currentMileages[sel] : null;
      if (sel && mile != null) {
        const buf = parseFloat(document.getElementById('danger-buffer')?.value) || 2.0;
        writePositionToRtdb(lat, lon, sel, mile, buf);
      } else if (lat && lon) {
        detectPosition();
      }
    }

    // ── Map helpers ──────────────────────────────────────────────
    function initMap() {
      map = L.map('map', { zoomControl: true }).setView([23.7, 120.9], 8);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OSM contributors'
      }).addTo(map);
      trackLayerGroup = L.layerGroup().addTo(map);
      map.on('click', e => {
        document.getElementById('lat').value = e.latlng.lat.toFixed(6);
        document.getElementById('lon').value = e.latlng.lng.toFixed(6);
        setUserMarker(e.latlng.lat, e.latlng.lng);
        detectPosition();
      });
    }

    function setUserMarker(lat, lon) {
      if (userMarker) userMarker.remove();
      userMarker = L.marker([lat, lon], {
        icon: L.divIcon({
          className: 'user-loc',
          html: '<div style="background:#0ea5e9;width:14px;height:14px;border-radius:9999px;border:2px solid white;box-shadow:0 0 0 3px rgba(14,165,233,.3)"></div>',
          iconSize: [14,14], iconAnchor: [7,7]
        })
      }).addTo(map).bindPopup('目前位置');
      map.panTo([lat, lon]);
    }

    function showProjection(lat, lon, lineName) {
      if (projMarker) projMarker.remove();
      projMarker = L.circleMarker([lat, lon], { radius: 8, color: '#10b981', fillColor: '#10b981', fillOpacity: 0.9, weight: 2 }).addTo(map);
      projMarker.bindPopup(`投影點<br>${lineName}`);
    }

    function updateDangerOnMap(data) {
      if (!map) return;
      if (!dangerLayer) dangerLayer = L.layerGroup().addTo(map);
      else dangerLayer.clearLayers();
      const stations = data.danger_zone?.stations || [];
      if (!stations.length) return;
      const pts = [];
      stations.forEach(s => {
        if (s.lat && s.lon) {
          pts.push([s.lat, s.lon]);
          L.circleMarker([s.lat, s.lon], { color: '#dc2626', fillColor: '#dc2626', fillOpacity: 0.45, radius: 7, weight: 2 })
            .addTo(dangerLayer).bindPopup(`警戒站: ${s.name}`);
        }
      });
      if (pts.length >= 2) {
        L.polyline(pts, { color: '#dc2626', weight: 7, opacity: 0.35, dashArray: '6,3' }).addTo(dangerLayer);
      }
    }

    function getTrainShortCode(t) {
      if (!t) return '?';
      if (t.includes('區間')) return '區'; if (t.includes('莒光')) return '莒';
      if (t.includes('自強')) return '自'; if (t.includes('普悠瑪')) return '普';
      if (t.includes('太魯閣')) return '太'; if (t.includes('復興')) return '復';
      return t.charAt(0) || '?';
    }

    function updateTrainMarkersOnMap(data) {
      if (!map) return;
      trainMarkers.forEach(m => m?.remove());
      trainMarkers = [];
      (data.directions || []).forEach((dir, di) => {
        const color = di === 0 ? '#3b82f6' : '#f97316';
        (dir.trains || []).forEach(t => {
          const p = t.current_station_pos;
          if (!p?.lat || !p?.lon) return;
          const short = getTrainShortCode(t.train_type);
          let angle = t.track_angle ?? (di === 0 ? 180 : 0);
          if (t.track_angle == null && t.next_station_pos?.lat) {
            const dlat = t.next_station_pos.lat - p.lat, dlon = t.next_station_pos.lon - p.lon;
            const mlr = ((p.lat + t.next_station_pos.lat) / 2) * Math.PI / 180;
            angle = Math.atan2(dlon * Math.cos(mlr), dlat) * 180 / Math.PI;
          }
          const icon = L.divIcon({
            html: `<svg width="36" height="36" viewBox="0 0 36 36" style="overflow:visible">
              <circle cx="18" cy="18" r="9" fill="${color}" stroke="#fff" stroke-width="2"/>
              <text x="18" y="18" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="8" font-weight="700" font-family="sans-serif">${short}</text>
              <g transform="translate(18,18)"><g transform="rotate(${angle-90})">
                <g style="animation:arrow-bob 900ms infinite alternate ease-in-out">
                  <g transform="translate(9.5,0)"><polygon points="0,-3 6,0 0,3" fill="${color}" stroke="#fff" stroke-width="0.8"/></g>
                </g></g></g>
            </svg>`,
            className: '', iconSize: [36,36], iconAnchor: [18,18]
          });
          const marker = L.marker([p.lat, p.lon], { icon }).addTo(map)
            .bindPopup(`<b>${t.train_no} ${t.train_type||''}</b><br>${dir.label}<br>預計 ${t.est_eta_min} 分通過<br>延誤 ${t.delay_min||0} 分`);
          trainMarkers.push(marker);
        });
      });
    }

    // ── UI helpers ───────────────────────────────────────────────
    function withPreservedScroll(fn) {
      const y = window.scrollY || 0;
      fn();
      requestAnimationFrame(() => window.scrollTo(0, y));
    }

    function renderTrainCards(trains, color, dangerIds = []) {
      if (!trains.length) return `<div class="text-sm italic text-${color}-600">目前此方向無即將通過列車</div>`;
      return trains.map(t => {
        const eta = t.est_eta_min ?? '?';
        const urgent = eta < 5;
        const bg = urgent ? 'bg-red-100 border-red-400' : `bg-white border-${color}-200`;
        const etaColor = urgent ? 'text-red-700' : `text-${color}-700`;
        const isInDanger = dangerIds.includes(t.current_station_id);
        const dangerNote = isInDanger ? `<div class="mt-1 text-xs font-bold text-red-700">目前列車已在警戒車站範圍，請注意安全。</div>` : '';
        const showDismiss = alarmActive && alarmEnabled && alarmTrainIds.has(t.train_no);
        const dismissBtn = showDismiss
          ? `<button class="alarm-dismiss-btn alarm-btn-active mt-1.5 w-full py-1.5 text-xs font-bold bg-red-600 text-white rounded-lg" onclick="stopAlarm()">🔕 關閉警報</button>`
          : '';
        return `
          <div class="border ${bg} rounded-xl p-2.5">
            <div class="flex justify-between items-start">
              <div class="font-mono text-sm font-bold">${t.train_no} <span class="text-base font-normal">${t.train_type||''}</span></div>
              <div class="text-3xl font-black tabular-nums ${etaColor}">${eta} <span class="font-black">分</span></div>
            </div>
            <div class="mt-0.5 text-xs text-slate-600">
              目前 ${t.current_mile_km??'-'} km${t.delay_min ? ` · 延誤 ${t.delay_min} 分` : ''}
            </div>
            ${dangerNote}${dismissBtn}
          </div>`;
      }).join('');
    }

    // ── Events ───────────────────────────────────────────────────
    function bindEvents() {
      document.getElementById('btn-my-loc')?.addEventListener('click', () => {
        if (!navigator.geolocation) { alert('瀏覽器不支援定位'); return; }
        navigator.geolocation.getCurrentPosition(pos => {
          document.getElementById('lat').value = pos.coords.latitude.toFixed(6);
          document.getElementById('lon').value = pos.coords.longitude.toFixed(6);
          setUserMarker(pos.coords.latitude, pos.coords.longitude);
          detectPosition();
        }, err => alert('定位失敗：' + err.message), { enableHighAccuracy: true, timeout: 10000 });
      });

      document.getElementById('btn-refresh')?.addEventListener('click', () => {
        const lat = parseFloat(document.getElementById('lat').value);
        const lon = parseFloat(document.getElementById('lon').value);
        if (lat && lon) triggerUpdate(true);
        else detectPosition();
      });

      document.getElementById('btn-clear')?.addEventListener('click', () => {
        [userMarker, projMarker].forEach(m => m?.remove());
        if (dangerLayer) dangerLayer.clearLayers();
        trainMarkers.forEach(m => m?.remove()); trainMarkers = [];
        if (rtdbResultsRef) { rtdbResultsRef.off(); rtdbResultsRef = null; }
        document.getElementById('current-pos').innerHTML = '已清除';
        document.getElementById('line-select').innerHTML = '';
        document.getElementById('north-trains').innerHTML = '';
        document.getElementById('south-trains').innerHTML = '';
        document.getElementById('danger-alert')?.classList.add('hidden');
        document.getElementById('trains-loading')?.classList.remove('hidden');
        document.getElementById('trains-panels')?.classList.add('hidden');
        document.getElementById('lat').value = '';
        document.getElementById('lon').value = '';
        window.currentMileages = {}; window.currentSelectedLine = null;
        stopAutoRefresh();
        document.getElementById('auto-refresh').checked = false;
      });

      const autoCb = document.getElementById('auto-refresh');
      const bufRange = document.getElementById('danger-buffer-range');
      const bufNum = document.getElementById('danger-buffer');

      function syncBuffer(val) {
        const v = Math.max(0.5, Math.min(20, parseFloat(val) || 2.0));
        if (bufRange) bufRange.value = v;
        if (bufNum) bufNum.value = v;
        return v;
      }

      function startAutoRefresh() {
        stopAutoRefresh();
        autoInterval = setInterval(() => {
          if (!navigator.geolocation) return;
          navigator.geolocation.getCurrentPosition(pos => {
            document.getElementById('lat').value = pos.coords.latitude.toFixed(6);
            document.getElementById('lon').value = pos.coords.longitude.toFixed(6);
            detectPosition();
          }, () => {}, { enableHighAccuracy: true, timeout: 8000 });
        }, 10000);
      }
      function stopAutoRefresh() {
        if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
      }
      window.startAutoRefresh = startAutoRefresh;
      window.stopAutoRefresh = stopAutoRefresh;

      autoCb?.addEventListener('change', () => autoCb.checked ? startAutoRefresh() : stopAutoRefresh());

      bufRange?.addEventListener('input', () => {
        const v = syncBuffer(bufRange.value);
        clearTimeout(bufferUpdateTimer);
        bufferUpdateTimer = setTimeout(() => triggerUpdate(false), 220);
      });
      bufRange?.addEventListener('change', () => { syncBuffer(bufRange.value); triggerUpdate(false); });
      bufNum?.addEventListener('change', () => { syncBuffer(bufNum.value); triggerUpdate(false); });

      document.getElementById('line-select')?.addEventListener('change', e => {
        if (e.target.value) { window.currentSelectedLine = e.target.value; triggerUpdate(true); }
      });

      const keepAwakeCb = document.getElementById('keep-awake');
      if (!('wakeLock' in navigator)) {
        // Hide if unsupported
        document.getElementById('keep-awake-label')?.style.setProperty('display', 'none');
      }
      keepAwakeCb?.addEventListener('change', () => {
        keepAwakeCb.checked ? requestWakeLock() : releaseWakeLock();
      });

      document.getElementById('btn-alarm-toggle')?.addEventListener('click', () => {
        alarmEnabled = !alarmEnabled;
        const btn = document.getElementById('btn-alarm-toggle');
        if (!alarmEnabled) {
          stopAlarm();
          btn.textContent = '🔇';
          btn.style.backgroundColor = '#94a3b8';
        } else {
          btn.textContent = '🔊';
          btn.style.backgroundColor = '';
          btn.classList.remove('bg-slate-400');
        }
      });

      const mapExpandBtn = document.getElementById('btn-map-expand');
      const mapEl = document.getElementById('map');
      mapExpandBtn?.addEventListener('click', () => {
        mapExpanded = !mapExpanded;
        mapEl.style.height = mapExpanded ? '360px' : '150px';
        mapExpandBtn.textContent = mapExpanded ? '縮小' : '放大';
        setTimeout(() => map?.invalidateSize(), 60);
      });
    }

    // ── PWA install prompt ───────────────────────────────────────
    let deferredInstallPrompt = null;
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches
                      || window.navigator.standalone === true;

    if (!isStandalone) {
      // Android / desktop Chrome — capture install prompt
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        deferredInstallPrompt = e;
        document.getElementById('install-bar')?.classList.remove('hidden');
      });

      window.addEventListener('appinstalled', () => {
        document.getElementById('install-bar')?.classList.add('hidden');
        deferredInstallPrompt = null;
      });

      document.getElementById('btn-install')?.addEventListener('click', async () => {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        const { outcome } = await deferredInstallPrompt.userChoice;
        if (outcome === 'accepted') document.getElementById('install-bar')?.classList.add('hidden');
        deferredInstallPrompt = null;
      });

      // iOS Safari — show guide if not dismissed before
      const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) && !window.MSStream;
      const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
      if (isIOS && isSafari && !localStorage.getItem('iosGuideDismissed')) {
        document.getElementById('ios-install-guide')?.classList.remove('hidden');
      }
    }

    // ── Bootstrap ────────────────────────────────────────────────
    async function bootstrap() {
      initMap();
      bindEvents();

      // Register service worker for offline cache + install prompt
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW:', e));
      }

      // Pre-load geo data in background so first GPS click is fast
      getGeoIndex('./data').catch(e => console.warn('geo preload:', e));

      // Start auto-refresh if checked (default on)
      if (document.getElementById('auto-refresh')?.checked) {
        window.startAutoRefresh();
      }
    }

    window.onload = bootstrap;
  </script>
</body>
</html>
