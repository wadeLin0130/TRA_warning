<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark navy background -->
  <rect width="100" height="100" rx="20" fill="#0f172a"/>

  <!-- Warning triangle (amber) -->
  <polygon points="50,6 90,73 10,73" fill="#f59e0b"/>
  <polygon points="50,6 90,73 10,73" fill="none" stroke="#0f172a" stroke-width="2" stroke-linejoin="round"/>

  <!-- Exclamation mark inside triangle -->
  <rect x="46" y="20" width="8" height="32" rx="3.5" fill="#0f172a"/>
  <circle cx="50" cy="63" r="5.5" fill="#0f172a"/>

  <!-- Train silhouette at bottom -->
  <rect x="16" y="79" width="68" height="11" rx="3" fill="#e2e8f0"/>
  <!-- Orange livery stripe -->
  <rect x="16" y="84" width="68" height="4" fill="#f97316"/>
  <!-- Windows -->
  <rect x="22" y="81" width="8" height="5" rx="1.5" fill="#38bdf8"/>
  <rect x="34" y="81" width="8" height="5" rx="1.5" fill="#38bdf8"/>
  <rect x="46" y="81" width="8" height="5" rx="1.5" fill="#38bdf8"/>
  <!-- Wheels -->
  <circle cx="28" cy="91" r="4" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <circle cx="72" cy="91" r="4" fill="#334155" stroke="#64748b" stroke-width="1"/>
</svg>
